services:
  - type: web
    name: footballai-backend
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements-local.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 1200
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PUBLIC_API_BASE_URL
        value: ""
